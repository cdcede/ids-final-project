# IDS final project — single unified stack.
#
# Three data domains feed one BI layer (Apache Superset):
#
#   1. STREAMING   tweets1.json -> python-mqtt -> mosquitto -> kafka-connect
#                  -> kafka -> druid  (datasource "tweets-kafka")
#   2. RELATIONAL  mariadb (user_personalities.mbti_labels) + hive (users)
#   3. GRAPH       cassandra cluster cas1/cas2/cas3 (twitter.edges), preloaded
#
# Superset connections:
#   - Druid    -> native druid://  dialect
#   - MariaDB  -> native mysql+pymysql://
#   - Hive     -> native hive://
#   - Cassandra-> NOT SQL: queried through PrestoDB  (presto://presto:8080/cassandra)
#
# Everything shares the default compose network, so services reach each other by
# name (kafka, druid, mariadb, hive, cas1, presto, ...).

services:
  # ---------------------------------------------------------------------------
  # STREAMING pipeline (MQTT -> Kafka -> Druid)
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    restart: unless-stopped
    hostname: zookeeper
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"

  kafka-connect:
    image: confluentinc/cp-kafka-connect:7.5.0
    hostname: kafka-connect
    container_name: kafka-connect
    depends_on:
      - kafka
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:9092
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: "connect-group"
      CONNECT_CONFIG_STORAGE_TOPIC: "connect-configs"
      CONNECT_OFFSET_STORAGE_TOPIC: "connect-offsets"
      CONNECT_STATUS_STORAGE_TOPIC: "connect-status"
      CONNECT_KEY_CONVERTER: "org.apache.kafka.connect.storage.StringConverter"
      CONNECT_VALUE_CONVERTER: "org.apache.kafka.connect.storage.StringConverter"
      CONNECT_INTERNAL_KEY_CONVERTER: "org.apache.kafka.connect.storage.StringConverter"
      CONNECT_INTERNAL_VALUE_CONVERTER: "org.apache.kafka.connect.storage.StringConverter"
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_PLUGIN_PATH: "/usr/share/java,/etc/kafka-connect/jars"
      CONNECT_CONFLUENT_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - ./jars/:/etc/kafka-connect/jars

  druid:
    image: jdvelasq/druid:0.22.1
    container_name: druid
    restart: unless-stopped
    ports:
      - "50070:50070"
      - "8088:8088"
      - "8888:8888"
      - "9999:9999"
    volumes:
      - ./:/workspace

  python-mqtt:
    # Built locally from ./python (base python:3.11-slim is multi-arch). The
    # prebuilt cdcede/python-mqtt:1.0 is published arm64-only -> fails on amd64.
    build: ./python
    image: ids-python-mqtt:latest
    container_name: python-mqtt
    depends_on:
      - mosquitto
    volumes:
      - ./tweets1.json:/app/tweets1.json

  init:
    image: curlimages/curl:8.11.0
    container_name: init
    depends_on:
      - kafka-connect
      - druid
    restart: "no"
    volumes:
      - ./connect-mqtt-source.json:/config/connect-mqtt-source.json:ro
      - ./druid-supervisor.json:/config/druid-supervisor.json:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e

        echo "Waiting for Kafka Connect REST API..."
        until curl -sf http://kafka-connect:8083/connectors >/dev/null; do sleep 3; done

        echo "Waiting for Druid Overlord supervisor API..."
        until curl -sf http://druid:9999/druid/indexer/v1/supervisor >/dev/null; do sleep 3; done

        echo "Registering MQTT source connector..."
        if curl -sf http://kafka-connect:8083/connectors/mqtt-source >/dev/null 2>&1; then
          echo "  connector 'mqtt-source' already exists, skipping."
        else
          curl -sf --retry 10 --retry-delay 3 --retry-all-errors \
            -X POST -H "Content-Type: application/json" \
            --data @/config/connect-mqtt-source.json \
            http://kafka-connect:8083/connectors
          echo "  connector 'mqtt-source' registered."
        fi

        echo "Submitting Druid ingestion supervisor..."
        curl -sf --retry 10 --retry-delay 3 --retry-all-errors \
          -X POST -H "Content-Type: application/json" \
          --data @/config/druid-supervisor.json \
          http://druid:9999/druid/indexer/v1/supervisor
        echo "  supervisor 'tweets-kafka' submitted."

        echo "Init complete."

  # ---------------------------------------------------------------------------
  # RELATIONAL stores (queried directly by Superset)
  # ---------------------------------------------------------------------------
  mariadb:
    # Built locally from ./mariadb-personalities (base mariadb:10.11 is multi-arch
    # / amd64-ready). The teammate's prebuilt image urtatsberrocal/mariadb-
    # personalities is published arm64-only, so it cannot run on amd64 hosts.
    build: ./mariadb-personalities
    image: ids-mariadb-personalities:latest
    container_name: mariadb_personalities
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-user_personalities}
      MYSQL_USER: ${MYSQL_USER:-ids_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ids_password}
    ports:
      - "3306:3306"
    volumes:
      - ./mariadb-personalities/data:/var/lib/mysql-files/data:ro
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  hive:
    image: iraida107/hive-users:latest
    platform: linux/amd64
    container_name: hive_users
    environment:
      # The image ships a pre-initialized Derby metastore (with the users data
      # baked in). The entrypoint derives SKIP_SCHEMA_INIT from IS_RESUME
      # (SKIP_SCHEMA_INIT="${IS_RESUME:-false}"), so setting IS_RESUME=true is
      # what skips the re-run of `schematool -initSchema`, which otherwise fails
      # with "schema already exists".
      IS_RESUME: "true"
    ports:
      - "10000:10000"   # HiveServer2 (JDBC/ODBC)
      - "10002:10002"   # HiveServer2 Web UI
      - "9083:9083"     # Hive Metastore
    volumes:
      - ./mariadb-personalities/users1.json:/opt/hive/users1.json:ro
    depends_on:
      mariadb:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # GRAPH store — Cassandra 3-node / RF=3 cluster (image from Docker Hub,
  # orchestration adapted from github.com/Mykol58/ids-twitter-graph).
  # Nodes join one at a time (chained healthchecks) to avoid bootstrap token
  # collisions; the one-shot `cassandra-loader` creates the schema and bulk-loads
  # twitter.edges ONCE after all three nodes are healthy, then exits.
  # ---------------------------------------------------------------------------
  cas1:
    image: mikelez/ids-twitter-cassandra:latest
    platform: linux/amd64
    container_name: cas1
    hostname: cas1
    environment: &cassandra-env
      CASSANDRA_CLUSTER_NAME: "ids-twitter-graph"
      CASSANDRA_SEEDS: "cas1"
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_DC: datacenter1
      MAX_HEAP_SIZE: "256M"
      HEAP_NEWSIZE: "64M"
    mem_limit: 1024m
    ports:
      - "9042:9042"   # CQL native transport
    volumes:
      - cas1_data:/var/lib/cassandra

  cas2:
    image: mikelez/ids-twitter-cassandra:latest
    platform: linux/amd64
    container_name: cas2
    hostname: cas2
    environment: *cassandra-env
    mem_limit: 1024m
    depends_on:
      cas1:
        condition: service_healthy
    volumes:
      - cas2_data:/var/lib/cassandra

  cas3:
    image: mikelez/ids-twitter-cassandra:latest
    platform: linux/amd64
    container_name: cas3
    hostname: cas3
    environment: *cassandra-env
    mem_limit: 1024m
    depends_on:
      cas2:
        condition: service_healthy
    volumes:
      - cas3_data:/var/lib/cassandra

  cassandra-loader:
    image: mikelez/ids-twitter-cassandra:latest
    platform: linux/amd64
    container_name: ids-loader
    depends_on:
      cas3:
        condition: service_healthy
    environment:
      CASSANDRA_HOST: cas1
    entrypoint: ["/opt/ids/load.sh"]
    healthcheck:
      disable: true
    restart: "no"

  # ---------------------------------------------------------------------------
  # BI layer — PrestoDB (Cassandra -> SQL bridge) + Apache Superset
  # ---------------------------------------------------------------------------
  presto:
    image: prestodb/presto:latest
    container_name: presto
    hostname: presto
    ports:
      - "8080:8080"   # Presto UI + REST (also the endpoint Superset uses)
    volumes:
      - ./presto/cassandra.properties:/opt/presto-server/etc/catalog/cassandra.properties:ro
    mem_limit: 2g
    restart: unless-stopped
    depends_on:
      cas1:
        condition: service_healthy

  superset:
    build: ./superset
    image: ids-superset:latest
    container_name: superset
    depends_on:
      - presto
    environment:
      SUPERSET_SECRET_KEY: "ids-project-superset-secret-change-me"
      SUPERSET_LOAD_EXAMPLES: "no"
    ports:
      - "8089:8088"   # Superset web UI (8088 is taken by Druid)
    volumes:
      - superset_home:/app/superset_home
    mem_limit: 2g
    command: ["/app/superset-bootstrap.sh"]

volumes:
  mariadb_data:
  cas1_data:
  cas2_data:
  cas3_data:
  superset_home:
