# PrestoDB catalog that exposes the Cassandra cluster as SQL to Superset.
# Presto runs on the same Docker network as the cluster, so it reaches the
# nodes by their service names (cas1/cas2/cas3). This catalog is named
# "cassandra" -> tables appear as cassandra.<keyspace>.<table>, e.g.
# cassandra.twitter.edges. The Superset connection URI uses this name:
#   presto://presto:8080/cassandra
connector.name=cassandra
cassandra.contact-points=cas1,cas2,cas3
cassandra.native-protocol-port=9042

# Match the cluster: reads use QUORUM (survives one node down at RF=3).
cassandra.consistency-level=QUORUM
